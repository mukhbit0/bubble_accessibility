name: bubble_accessibility
description: >-
  Floating bubble overlay for Android apps. Auto-shows when backgrounded or
  killed, streams notification payloads to Dart, supports accessibility and
  foreground-service modes.
version: 0.1.1
homepage: https://github.com/mukhbit0/bubble_accessibility
repository: https://github.com/mukhbit0/bubble_accessibility
issue_tracker: https://github.com/mukhbit0/bubble_accessibility/issues

topics:
  - overlay
  - accessibility
  - foreground-service
  - notification
  - bubble

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.ionicerrrrscode.bubble_accessibility
        pluginClass: BubbleAccessibilityPlugin
